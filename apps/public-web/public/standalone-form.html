<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de inscripci&oacute;n</title>
    <style>
      :root {
        font-family: "Manrope", "Segoe UI", sans-serif;
        --primary: #ff5c35;
        --primary-strong: #d94524;
        --primary-soft: rgba(255, 92, 53, 0.2);
        --primary-surface: #ededed;
        --surface: #ededed;
        --surface-soft: #ededed;
        --text-main: #2f3338;
        --text-muted: #5f6873;
        --border: #ff5c35;
        color: var(--text-main);
        background: #ededed;
        line-height: 1.4;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--text-main);
        background: #ededed;
        min-height: 100vh;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .layout {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .shell {
        width: min(860px, 100%);
        display: grid;
        gap: 14px;
      }

      .topbar {
        background: #ededed;
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 11px;
      }

      .topbar-banner {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 12px;
        border: 1px solid var(--border);
      }

      .card {
        background: #ededed;
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 16px 48px rgba(48, 52, 59, 0.12);
      }

      h2 {
        margin: 0;
        font-size: clamp(18px, 2.3vw, 22px);
        line-height: 1.2;
        font-weight: 700;
        color: #ab4f00;
      }

      .form-title-image {
        display: block;
        width: min(360px, 100%);
        height: auto;
        margin: 0 0 14px;
      }

      .subtitle {
        margin: 0 0 14px;
        color: var(--text-muted);
      }

      form {
        display: grid;
        gap: 8px;
      }

      label {
        display: block;
        margin-top: 12px;
        font-weight: 700;
        color: #3b4149;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        display: block;
        border: 1px solid var(--border);
        border-radius: 11px;
        padding: 12px 13px;
        background: var(--surface);
        width: 100%;
        color: var(--text-main);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      input[type="checkbox"] {
        accent-color: var(--primary);
      }

      input:focus,
      textarea:focus {
        outline: 2px solid rgba(255, 92, 53, 0.28);
        border-color: var(--primary);
      }

      .courses-grid {
        margin-top: 6px;
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .day-card {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: #ededed;
      }

      .day-card h3 {
        margin: 0 0 7px;
        color: #9b5200;
        font-size: 16px;
      }

      .day-heading-image {
        display: block;
        width: min(210px, 100%);
        height: auto;
        margin: 0 0 7px;
      }

      .day-courses {
        display: grid;
        gap: 8px;
      }

      .course-option {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 3px 9px;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 9px;
        background: #ededed;
        color: #3b4149;
        cursor: pointer;
      }

      .course-option.selected {
        border-color: var(--border);
        background: #ededed;
      }

      .course-option input {
        margin: 0;
        grid-row: span 2;
        width: auto;
        accent-color: var(--primary);
      }

      .course-title {
        font-weight: 700;
      }

      .course-time {
        color: #686f79;
        font-size: 13px;
      }

      .checkbox {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        margin-top: 12px;
      }

      .checkbox input {
        width: auto;
        margin-top: 3px;
        transform: scale(1.15);
        accent-color: var(--primary);
      }

      .checkbox label {
        margin-top: 0;
      }

      button {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 13px 16px;
        background: linear-gradient(120deg, var(--primary), var(--primary-strong));
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        width: 100%;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 10px 24px rgba(255, 92, 53, 0.42);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .error {
        margin: 2px 0 0;
        color: #b42318;
        font-size: 14px;
      }

      .hint {
        margin: 4px 0 0;
        color: var(--text-muted);
        font-size: 14px;
      }

      .success {
        display: none;
      }

      .success-popup {
        position: fixed;
        top: 20px;
        left: 50%;
        z-index: 1200;
        width: min(420px, calc(100vw - 32px));
        padding: 15px 16px;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: #ededed;
        color: #7d3600;
        box-shadow: 0 18px 42px rgba(23, 18, 12, 0.22);
        display: none;
        grid-template-columns: auto 1fr;
        gap: 14px;
        align-items: center;
        transform: translateX(-50%);
        pointer-events: none;
      }

      .success-popup.visible {
        display: grid;
        animation: popup-enter 0.34s cubic-bezier(0.2, 0.9, 0.2, 1), popup-leave 0.35s ease-in 2.15s forwards;
      }

      .success-popup__icon {
        width: 42px;
        height: 42px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--primary), var(--primary-strong));
        color: #fff;
        font-size: 22px;
        font-weight: 800;
        box-shadow: 0 10px 18px rgba(255, 92, 53, 0.32);
      }

      .success-popup__content {
        display: grid;
        gap: 3px;
      }

      .success-popup__content strong {
        font-size: 15px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .success-popup__content span {
        font-size: 15px;
        line-height: 1.35;
      }

      @keyframes popup-enter {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(-18px) scale(0.94);
        }

        70% {
          opacity: 1;
          transform: translateX(-50%) translateY(2px) scale(1.01);
        }

        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0) scale(1);
        }
      }

      @keyframes popup-leave {
        to {
          opacity: 0;
          transform: translateX(-50%) translateY(-10px) scale(0.96);
        }
      }

      @media (max-width: 720px) {
        .layout {
          padding: 20px 16px;
        }

        .courses-grid {
          grid-template-columns: 1fr;
        }

        .card {
          padding: 19px;
        }
      }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  </head>
  <body>
    <main class="layout">
      <section class="shell">
        <header class="topbar">
          <img class="topbar-banner" src="banner_final.jpg" alt="Buro Business Week" />
        </header>

        <article class="card">
          <img class="form-title-image" src="titulo_form.png" alt="Formulario de inscripci&oacute;n" />

          <form id="registrationForm" novalidate>
          <label for="fullName">Nombre completo</label>
          <input id="fullName" name="fullName" required minlength="3" maxlength="120" />
          <p class="error" data-error-for="fullName"></p>

          <label for="email">Correo electr&oacute;nico</label>
          <input id="email" name="email" type="email" required maxlength="160" />
          <p class="error" data-error-for="email"></p>

          <label for="phone">Numero de tel&eacute;fono (con c&oacute;digo de pa&iacute;s)</label>
          <input id="phone" name="phone" required minlength="8" maxlength="30" placeholder="+50212345678" />
          <p class="error" data-error-for="phone"></p>

          <label for="companyName">Empresa donde laboras</label>
          <input id="companyName" name="companyName" required minlength="2" maxlength="160" />
          <p class="error" data-error-for="companyName"></p>

          <label for="jobPosition">Puesto desempe&ntilde;ado</label>
          <input id="jobPosition" name="jobPosition" required minlength="2" maxlength="120" />
          <p class="error" data-error-for="jobPosition"></p>

          <label for="academicDegree">&Uacute;ltimo grado acad&eacute;mico cursado</label>
          <input id="academicDegree" name="academicDegree" required minlength="2" maxlength="120" />
          <p class="error" data-error-for="academicDegree"></p>

          <label for="interests">Preferencias de estudio o temas de inter&eacute;s</label>
          <textarea id="interests" name="interests" rows="4" required minlength="3" maxlength="500"></textarea>
          <p class="error" data-error-for="interests"></p>

          <label>Cursos disponibles (puedes elegir varios)</label>
          <section id="coursesGrid" class="courses-grid" aria-label="Cursos disponibles por d&iacute;a"></section>
          <p class="error" data-error-for="courseIds"></p>

          <div class="checkbox">
            <input id="privacyAccepted" name="privacyAccepted" type="checkbox" />
            <label for="privacyAccepted">Autorizo el tratamiento de mis datos personales para fines informativos, comerciales y de seguimiento relacionados con los servicios de formaci&oacute;n ofrecidos por Bur&oacute; Business School.</label>
          </div>
          <p class="error" data-error-for="privacyAccepted"></p>

          <div id="turnstileContainer"></div>
          <p class="error" data-error-for="turnstileToken"></p>

          <button id="submitButton" type="submit" disabled>Enviar inscripci&oacute;n</button>
          <p id="globalError" class="error"></p>
          <p id="successMessage" class="success"></p>
          </form>
        </article>
      </section>
    </main>

    <div id="successPopup" class="success-popup" role="status" aria-live="polite">
      <div class="success-popup__icon" aria-hidden="true">&#10003;</div>
      <div class="success-popup__content">
        <strong>Inscripci&oacute;n exitosa</strong>
        <span>Tu inscripci&oacute;n fue realizada de manera exitosa.</span>
      </div>
    </div>

    <script>
      (function () {
        const API_BASE_URL = "https://api.nexlum.site";
        const TURNSTILE_SITE_KEY = "0x4AAAAAADBYgqT7dn9f56o-";
        const WEEK_DAYS = ["Lunes", "Martes", "Mi\u00e9rcoles", "Jueves"];
        const DAY_HEADING_IMAGES = {
          Lunes: "25may.png",
          Martes: "26may.png",
          ["Mi\u00e9rcoles"]: "27may.png",
          Jueves: "28may.png"
        };

        const formEl = document.getElementById("registrationForm");
        const coursesGridEl = document.getElementById("coursesGrid");
        const globalErrorEl = document.getElementById("globalError");
        const successEl = document.getElementById("successMessage");
        const successPopupEl = document.getElementById("successPopup");
        const submitButtonEl = document.getElementById("submitButton");
        const selectedCourseIds = new Set();

        let turnstileToken = "";
        let turnstileWidgetId = null;
        let courses = [];

        function normalizeDay(value) {
          return String(value || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase();
        }

        function renderDayHeading(day) {
          const imageName = DAY_HEADING_IMAGES[day];
          if (!imageName) return `<h3>${escapeHtml(day)}</h3>`;
          return `<img class="day-heading-image" src="${imageName}" alt="${escapeHtml(day)}" />`;
        }

        function setFieldError(field, message) {
          const node = document.querySelector(`[data-error-for="${field}"]`);
          if (node) node.textContent = message || "";
        }

        function clearErrors() {
          globalErrorEl.textContent = "";
          successEl.textContent = "";
          successPopupEl.classList.remove("visible");
          ["fullName", "email", "phone", "companyName", "jobPosition", "academicDegree", "interests", "courseIds", "privacyAccepted", "turnstileToken"]
            .forEach((field) => setFieldError(field, ""));
        }

        function updateSubmitState(isSubmitting) {
          const canSubmit = selectedCourseIds.size > 0 && turnstileToken.length >= 10 && !isSubmitting;
          submitButtonEl.disabled = !canSubmit;
          submitButtonEl.textContent = isSubmitting ? "Enviando..." : "Enviar inscripci\u00f3n";
        }

        function escapeHtml(value) {
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function renderCourses(items, emptyMessage) {
          const grouped = new Map(WEEK_DAYS.map((day) => [normalizeDay(day), []]));
          items.forEach((course) => {
            const dayKey = normalizeDay(course.day_of_week);
            if (grouped.has(dayKey)) grouped.get(dayKey).push(course);
          });

          coursesGridEl.innerHTML = WEEK_DAYS.map((day) => {
            const dayCourses = grouped.get(normalizeDay(day)) || [];
            const inner = dayCourses.length
              ? dayCourses.map((course) => `
                <label class="course-option" data-course-option="${course.id}">
                  <input type="checkbox" data-course-id="${course.id}" />
                  <span class="course-title">${escapeHtml(course.title)}</span>
                  <span class="course-time">${escapeHtml(course.schedule_label || "")}</span>
                </label>
              `).join("")
              : `<p class="hint">${escapeHtml(emptyMessage || "Sin cursos configurados.")}</p>`;
            return `<article class="day-card">${renderDayHeading(day)}<div class="day-courses">${inner}</div></article>`;
          }).join("");

          coursesGridEl.querySelectorAll("input[data-course-id]").forEach((checkbox) => {
            checkbox.addEventListener("change", (event) => {
              const id = event.target.getAttribute("data-course-id");
              const label = coursesGridEl.querySelector(`[data-course-option="${id}"]`);
              if (event.target.checked) {
                selectedCourseIds.add(id);
                if (label) label.classList.add("selected");
              } else {
                selectedCourseIds.delete(id);
                if (label) label.classList.remove("selected");
              }
              setFieldError("courseIds", "");
              updateSubmitState(false);
            });
          });
        }

        async function fetchCourses() {
          const response = await fetch(`${API_BASE_URL}/api/public/courses`, { method: "GET" });
          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            throw new Error(data.error || "No se pudieron cargar los cursos.");
          }
          const data = await response.json();
          courses = data.courses || [];
          renderCourses(courses);
        }

        function renderTurnstile() {
          let retries = 0;
          const maxRetries = 60;
          const timer = setInterval(() => {
            if (window.turnstile && typeof window.turnstile.render === "function") {
              clearInterval(timer);
              turnstileWidgetId = window.turnstile.render("#turnstileContainer", {
                sitekey: TURNSTILE_SITE_KEY,
                callback: function (token) {
                  turnstileToken = token || "";
                  setFieldError("turnstileToken", "");
                  updateSubmitState(false);
                },
                "expired-callback": function () {
                  turnstileToken = "";
                  setFieldError("turnstileToken", "Completa la verificaci\u00f3n de seguridad.");
                  updateSubmitState(false);
                },
                "error-callback": function () {
                  turnstileToken = "";
                  setFieldError("turnstileToken", "No se pudo validar captcha.");
                  updateSubmitState(false);
                }
              });
            } else {
              retries += 1;
              if (retries > maxRetries) {
                clearInterval(timer);
                setFieldError("turnstileToken", "No se pudo inicializar captcha.");
              }
            }
          }, 200);
        }

        function normalizePhone(value) {
          const cleaned = String(value || "").trim();
          const hasPlus = cleaned.startsWith("+");
          const digits = cleaned.replace(/\D/g, "");
          return hasPlus ? `+${digits}` : digits;
        }

        function isInternationalPhone(value) {
          return /^\+[1-9]\d{7,14}$/.test(String(value || ""));
        }

        function readPayload() {
          return {
            fullName: formEl.fullName.value.trim(),
            email: formEl.email.value.trim(),
            phone: normalizePhone(formEl.phone.value),
            companyName: formEl.companyName.value.trim(),
            jobPosition: formEl.jobPosition.value.trim(),
            academicDegree: formEl.academicDegree.value.trim(),
            interests: formEl.interests.value.trim(),
            courseIds: Array.from(selectedCourseIds),
            privacyAccepted: Boolean(formEl.privacyAccepted.checked),
            turnstileToken
          };
        }

        function validatePayload(payload) {
          const errors = {};
          if (payload.fullName.length < 3) errors.fullName = "Ingresa un nombre v\u00e1lido.";
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(payload.email)) errors.email = "Ingresa un correo v\u00e1lido.";
          if (payload.phone.length < 8) errors.phone = "Ingresa un tel\u00e9fono valido.";
          else if (!isInternationalPhone(payload.phone)) errors.phone = "Ingresa tu numero con el prefijo del \u00e1rea/pa\u00eds donde vives, por ejemplo +50212345678.";
          if (payload.companyName.length < 2) errors.companyName = "Ingresa la empresa donde laboras.";
          if (payload.jobPosition.length < 2) errors.jobPosition = "Ingresa el puesto que desempe\u00f1as.";
          if (payload.academicDegree.length < 2) errors.academicDegree = "Ingresa tu \u00faltimo grado acad\u00e9mico cursado.";
          if (payload.interests.length < 3) errors.interests = "Describe tus intereses de estudio.";
          if (payload.courseIds.length < 1) errors.courseIds = "Selecciona al menos un curso.";
          if (!payload.privacyAccepted) errors.privacyAccepted = "Debes aceptar la pol\u00edtica de privacidad.";
          if (payload.turnstileToken.length < 10) errors.turnstileToken = "Completa la verificaci\u00f3n de seguridad.";
          return errors;
        }

        async function submitRegistration(payload) {
          const response = await fetch(`${API_BASE_URL}/api/public/inscriptions`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(data.error || "No se pudo enviar la inscripci\u00f3n.");
          }
        }

        formEl.addEventListener("submit", async function (event) {
          event.preventDefault();
          clearErrors();

          const payload = readPayload();
          const errors = validatePayload(payload);
          if (Object.keys(errors).length > 0) {
            Object.keys(errors).forEach((key) => setFieldError(key, errors[key]));
            return;
          }

          updateSubmitState(true);
          try {
            await submitRegistration(payload);
            successEl.textContent = "Tu inscripci\u00f3n fue realizada exitosamente.";
            successPopupEl.classList.remove("visible");
            void successPopupEl.offsetWidth;
            successPopupEl.classList.add("visible");
            formEl.reset();
            selectedCourseIds.clear();
            coursesGridEl.querySelectorAll("[data-course-option]").forEach((node) => node.classList.remove("selected"));
            turnstileToken = "";
            if (window.turnstile && turnstileWidgetId !== null) {
              window.turnstile.reset(turnstileWidgetId);
            }
          } catch (error) {
            globalErrorEl.textContent = error.message || "Error al enviar la inscripci\u00f3n.";
          } finally {
            updateSubmitState(false);
          }
        });

        (async function boot() {
          renderCourses([], "Cargando cursos...");
          try {
            await fetchCourses();
          } catch (error) {
            globalErrorEl.textContent = error.message || "No se pudieron cargar los cursos.";
            renderCourses([], "No se pudieron cargar los cursos.");
          }
          renderTurnstile();
          updateSubmitState(false);
        })();
      })();
    </script>
  </body>
</html>
